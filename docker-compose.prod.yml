# ============================================
# MLM Platform - Production Docker Compose
# ============================================
# Usage:
#   VERSION=v1.0.0 docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mlm_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mlm_db}
      POSTGRES_USER: ${DB_USER:-mlm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mlm123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mlm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlm-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mlm_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlm-network

  # Backend API
  backend:
    image: ${DOCKERHUB_USERNAME:-ipproyectos}/mlm-backend:${VERSION:-latest}
    container_name: mlm_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mlm_db}
      DB_USER: ${DB_USER:-mlm}
      DB_PASSWORD: ${DB_PASSWORD:-mlm123}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # Redis
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      # 2FA
      TWO_FACTOR_SECRET_KEY: ${TWO_FACTOR_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mlm-network

  # Frontend (Nginx)
  frontend:
    image: ${DOCKERHUB_USERNAME:-ipproyectos}/mlm-frontend:${VERSION:-latest}
    container_name: mlm_frontend_prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    # SSL certificates (mount your certs here)
    # volumes:
    #   - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
    #   - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - backend
    networks:
      - mlm-network

volumes:
  postgres_data:
  redis_data:

networks:
  mlm-network:
    driver: bridge
