version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mlm_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: mlm_db
      POSTGRES_USER: ${DB_USER:-mlm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mlm123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mlm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlm-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mlm_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlm-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - VERSION=${VERSION:-latest}
    image: ipproyectosysoluciones/mlm-backend:${VERSION:-latest}
    container_name: mlm_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mlm_db
      DB_USER: ${DB_USER:-mlm}
      DB_PASSWORD: ${DB_PASSWORD:-mlm123}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      SENTRY_DSN: ${SENTRY_DSN:-}
      TWO_FACTOR_SECRET_KEY: ${TWO_FACTOR_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mlm-network

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VERSION=${VERSION:-latest}
        - VITE_API_URL: ${VITE_API_URL:-/api}
    image: ipproyectosysoluciones/mlm-frontend:${VERSION:-latest}
    container_name: mlm_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - mlm-network

volumes:
  postgres_data:
  redis_data:

networks:
  mlm-network:
    driver: bridge
