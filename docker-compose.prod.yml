# ============================================
# MLM Platform - Production
# ============================================
# Usage: VERSION=v1.0.0 docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mlm_db}
      POSTGRES_USER: ${DB_USER:-mlm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mlm123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mlm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlm-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlm-network

  backend:
    image: ${DOCKERHUB_USERNAME:-ipproyectos}/mlm-backend:${VERSION:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mlm_db}
      DB_USER: ${DB_USER:-mlm}
      DB_PASSWORD: ${DB_PASSWORD:-mlm123}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mlm-network

  frontend:
    image: ${DOCKERHUB_USERNAME:-ipproyectos}/mlm-frontend:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mlm-network

volumes:
  postgres_data:
  redis_data:

networks:
  mlm-network:
    driver: bridge
