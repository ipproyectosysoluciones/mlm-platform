name: Security Audit

on:
  schedule:
    # Run every Monday at 8:00 AM UTC
    - cron: '0 8 * * 1'

  workflow_dispatch:
    # Allow manual trigger
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'warning'
        type: choice
        options:
          - debug
          - info
          - warning
          - error

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Check for outdated dependencies
        run: |
          echo "## Dependency Check" >> $GITHUB_STEP_SUMMARY
          echo "```bash" >> $GITHUB_STEP_SUMMARY
          pnpm outdated 2>/dev/null || echo "No outdated dependencies" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Check Dependabot alerts
        run: |
          echo "## Dependabot Alerts Summary" >> $GITHUB_STEP_SUMMARY

          ALERTS=$(gh api /repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | {severity: .security_vulnerability.severity, package: .dependency.package.name}] | 
            group_by(.package) | .[] | {package: .[0].package, count: length, critical: ([.[] | select(.severity == "critical")] | length), high: ([.[] | select(.severity == "high")] | length)}')

          echo "$ALERTS" >> $GITHUB_STEP_SUMMARY

      - name: Create security issue if critical vulnerabilities found
        if: ${{ github.event.inputs.logLevel == 'debug' || true }}
        run: |
          CRITICAL=$(gh api /repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | select(.security_vulnerability.severity == "critical")] | length')

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::notice::Found $CRITICAL critical vulnerabilities - please review Dependabot alerts"
          fi

  update-security-docs:
    name: Update Security Documentation
    runs-on: ubuntu-latest
    needs: audit
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Dependabot summary
        run: |
          echo "## Weekly Security Report - $(date +'%Y-%m-%d')" > SECURITY_WEEKLY.md
          echo "" >> SECURITY_WEEKLY.md
          echo "### Vulnerabilities by Package" >> SECURITY_WEEKLY.md

          gh api /repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | {severity: .security_vulnerability.severity, package: .dependency.package.name}] | 
            group_by(.package) | .[] | 
            "#### \(.[0].package)\n- Total: \(length)\n- Critical: \([.[] | select(.severity == "critical")] | length)\n- High: \([.[] | select(.severity == "high")] | length)\n- Medium: \([.[] | select(.severity == "medium")] | length)"' >> SECURITY_WEEKLY.md

          echo "" >> SECURITY_WEEKLY.md
          echo "### Action Required" >> SECURITY_WEEKLY.md
          echo "- [ ] Review critical vulnerabilities" >> SECURITY_WEEKLY.md
          echo "- [ ] Update vulnerable packages" >> SECURITY_WEEKLY.md
          echo "- [ ] Run full test suite" >> SECURITY_WEEKLY.md

      - name: Commit security report
        run: |
          git config --local user.email "security@mlm-platform.io"
          git config --local user.name "Security Bot"
          git add SECURITY_WEEKLY.md
          git diff --staged --quiet || git commit -m "docs: update weekly security report $(date +'%Y-%m-%d')"
          git push || echo "Could not push security report"
