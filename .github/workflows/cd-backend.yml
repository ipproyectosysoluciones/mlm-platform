name: CD Backend

on:
  push:
    branches: [release]
    tags: ['v*']

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mlm-backend

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build backend
        run: cd backend && pnpm build

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:release
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Backend Deployed to Docker Hub"
          echo "**Version:** \`${{ github.ref_name }}\`"
          echo ""
          echo "\`\`\`bash"
          echo "docker pull ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "docker compose -f docker-compose.prod.yml up -d backend"
          echo "\`\`\`"
