name: CD

on:
  push:
    branches: [release]
    tags: ['v*']

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mlm-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mlm-frontend

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build backend
        run: cd backend && pnpm build

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: |
            backend/dist
            frontend/dist
          retention-days: 1

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: backend/dist

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:release
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: frontend/dist

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:release
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deployed"
          echo "**Version:** \`${{ github.ref_name }}\`"
          echo ""
          echo "\`\`\`bash"
          echo "docker pull ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"
          echo "docker compose -f docker-compose.prod.yml up -d"
          echo "\`\`\`"
