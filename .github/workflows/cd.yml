name: CD - Docker Deploy

on:
  push:
    branches:
      - release
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ipproyectos/mlm-backend
  FRONTEND_IMAGE: ipproyectos/mlm-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: read

    steps:
      - name: Deploy instructions
        run: |
          echo "🚀 Version ${{ github.ref_name }} pushed to Docker Hub"
          echo ""
          echo "📦 Images:"
          echo "   - ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "   - ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"
          echo ""
          echo "On your server, run:"
          echo ""
          echo "# Update images"
          echo "docker pull ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"
          echo ""
          echo "# Restart services"
          echo "docker compose -f docker-compose.prod.yml up -d --force-recreate"
