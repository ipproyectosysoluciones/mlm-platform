name: CD

on:
  push:
    branches: [release]
    tags: ['v*']

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mlm-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mlm-frontend

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "## 🚀 Deployed"
          echo "**Version:** \`${{ github.ref_name }}\`"
          echo ""
          echo "\`\`\`bash"
          echo "docker pull ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"
          echo "docker compose -f docker-compose.prod.yml up -d"
          echo "\`\`\`"
