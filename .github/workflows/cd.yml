name: CD - Docker Deploy

on:
  push:
    branches:
      - release
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  # Docker Hub user/repository format
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mlm-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mlm-frontend
  FORCE_NODE24: true

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:release
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=24

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "📦 Backend image: ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "📦 Frontend image: ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: read

    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful" 
          echo ""
          echo "**Version:** \`${{ github.ref_name }}\`"
          echo ""
          echo "### 📦 Docker Images"
          echo "| Service | Image | Tag |"
          echo "|---------|-------|-----|"
          echo "| Backend | \`${{ env.BACKEND_IMAGE }}\` | \`${{ github.ref_name }}\` |"
          echo "| Frontend | \`${{ env.FRONTEND_IMAGE }}\` | \`${{ github.ref_name }}\` |"
          echo ""
          echo "### 📋 Deploy Instructions"
          echo '```bash'
          echo "# SSH into your server and run:"
          echo "cd /path/to/mlm-platform"
          echo ""
          echo "# Pull latest images"
          echo "docker pull ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"
          echo ""
          echo "# Update and restart services"
          echo "docker compose -f docker-compose.prod.yml up -d --force-recreate"
          echo '```'
