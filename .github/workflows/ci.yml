name: CI

on:
  push:
    branches: [main, development]
    tags-ignore: ['v*']
  pull_request:
    branches: [main, development, release]

env:
  FORCE_NODE24: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mlm_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd redis-cli ping
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Backend
        run: |
          cd backend
          pnpm install --no-lockfile
          pnpm build
          pnpm test
        env:
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mlm_test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret

      - name: Integration tests
        run: pnpm test:integration
        env:
          DB_DIALECT: postgres
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_NAME: mlm_test
          TEST_DB_USER: test
          TEST_DB_PASSWORD: test
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Frontend
        run: |
          cd frontend
          pnpm install --no-lockfile --ignore-workspace
          pnpm test:run
          pnpm build
