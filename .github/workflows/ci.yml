name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Backend CI
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: mlm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

       - name: Install pnpm globally
         run: npm install -g pnpm@latest

      - name: Install dependencies
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ./backend
        run: pnpm build

      - name: Run unit tests
        working-directory: ./backend
        run: pnpm test
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: mlm_test
          DB_USER: root
          DB_PASSWORD: testpassword
          JWT_SECRET: ci-test-secret

      - name: Run integration tests
        working-directory: ./backend
        run: pnpm test:integration
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: mlm_test
          DB_USER: root
          DB_PASSWORD: testpassword
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

  # Frontend CI
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: mlm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

       - name: Install pnpm globally
         run: npm install -g pnpm@latest

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build backend (for E2E)
        working-directory: ./backend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          npm run seed || true

      - name: Start backend
        working-directory: ./backend
        run: |
          NODE_ENV=test node dist/server.cjs &
          sleep 5
          curl -f http://localhost:3000/api/health || exit 1

      - name: Run unit tests
        working-directory: ./frontend
        run: pnpm test:run

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        working-directory: ./frontend
        run: pnpm exec playwright test --project=chromium

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build

      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
