name: CI

on:
  push:
    branches: [main, development]
    tags-ignore: ['v*']
  pull_request:
    branches: [main, development, release]

env:
  FORCE_NODE24: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mlm_test
        ports: [5432:5432]
      redis:
        image: redis:7-alpine
        ports: [6379:6379]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build backend
        run: cd backend && pnpm build

      - name: Unit tests
        run: cd backend && pnpm test
        env:
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mlm_test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret

      - name: Integration tests
        run: cd backend && pnpm test:integration
        env:
          DB_DIALECT: postgres
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_NAME: mlm_test
          TEST_DB_USER: test
          TEST_DB_PASSWORD: test
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v')
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 1

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Unit tests
        run: cd frontend && pnpm test:run

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v')
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # Playwright E2E tests - ONLY runs on development branch
  # Heavy tests, not suitable for production deployments
  playwright:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Run Playwright tests
        run: cd frontend && npx playwright test
        env:
          VITE_API_URL: http://localhost:3000/api
