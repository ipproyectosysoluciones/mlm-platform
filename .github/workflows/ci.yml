name: CI

on:
  push:
    branches: [main, development]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [main, development, release]

env:
  FORCE_NODE24: true

# Least privilege permissions for CI workflow
permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  # Backend CI
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mlm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: ./backend
        run: pnpm install --no-lockfile

      - name: Build
        working-directory: ./backend
        run: pnpm build

      - name: Run unit tests
        working-directory: ./backend
        run: pnpm test
        env:
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mlm_test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret

      - name: Run integration tests
        working-directory: ./backend
        run: pnpm test:integration
        env:
          DB_DIALECT: postgres
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_NAME: mlm_test
          TEST_DB_USER: test
          TEST_DB_PASSWORD: test
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

  # Frontend CI
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --no-lockfile --ignore-workspace

      - name: Run unit tests
        working-directory: ./frontend
        run: pnpm test:run

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
