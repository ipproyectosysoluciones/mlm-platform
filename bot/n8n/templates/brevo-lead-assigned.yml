                  content: |
                    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F8F6F1;padding:40px 0;">
                      <tr>
                        <td align="center">
                          <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);">
                            <!-- HEADER -->
                            <tr>
                              <td style="background-color:#0F1F3D;padding:36px 40px;text-align:center;">
                                <p style="margin:0 0 6px;font-size:26px;font-weight:700;color:#ffffff;letter-spacing:2px;">NEXO REAL</p>
                                <p style="margin:0;font-size:11px;color:#C9A84C;letter-spacing:4px;text-transform:uppercase;">Propiedades · Inversión · Confianza</p>
                              </td>
                            </tr>
                            <!-- ALERT -->
                            <tr>
                              <td style="background-color:#C9A84C;padding:14px 40px;text-align:center;">
                                <p style="margin:0;font-size:13px;font-weight:700;color:#0F1F3D;letter-spacing:1px;text-transform:uppercase;">🏠 Nuevo lead asignado a tu cartera</p>
                              </td>
                            </tr>
                            <!-- GREETING -->
                            <tr>
                              <td style="padding:40px 40px 24px;">
                                <p style="margin:0 0 8px;font-size:22px;color:#0F1F3D;">Hola, {{ params.advisor_name }}</p>
                                <p style="margin:0;font-size:14px;color:#718096;line-height:1.7;">Se te ha asignado un nuevo lead. Contactalo dentro de las próximas <strong style="color:#C53030;">2 horas</strong> para maximizar las chances de conversión.</p>
                              </td>
                            </tr>
                            <!-- LEAD CARD -->
                            <tr>
                              <td style="padding:0 40px 32px;">
                                <table width="100%" cellpadding="0" cellspacing="0" style="border:2px solid #C9A84C;border-radius:8px;overflow:hidden;">
                                  <tr>
                                    <td style="background-color:#0F1F3D;padding:16px 24px;">
                                      <p style="margin:0;font-size:11px;color:#C9A84C;text-transform:uppercase;letter-spacing:2px;">Datos del Lead</p>
                                    </td>
                                  </tr>
                                  <tr>
                                    <td style="padding:16px 24px;border-bottom:1px solid #E2E8F0;">
                                      <p style="margin:0 0 3px;font-size:11px;color:#A0AEC0;text-transform:uppercase;letter-spacing:1px;">Nombre</p>
                                      <p style="margin:0;font-size:17px;font-weight:700;color:#0F1F3D;">{{ params.lead_name }}</p>
                                    </td>
                                  </tr>
                                  <tr>
                                    <td style="padding:16px 24px;border-bottom:1px solid #E2E8F0;">
                                      <p style="margin:0 0 3px;font-size:11px;color:#A0AEC0;text-transform:uppercase;letter-spacing:1px;">WhatsApp</p>
                                      <p style="margin:0;font-size:16px;font-weight:600;"><a href="https://wa.me/{{ params.lead_phone }}" style="color:#25D366;text-decoration:none;">+{{ params.lead_phone }}</a></p>
                                    </td>
                                  </tr>
                                  <tr>
                                    <td style="padding:16px 24px;border-bottom:1px solid #E2E8F0;">
                                      <p style="margin:0 0 3px;font-size:11px;color:#A0AEC0;text-transform:uppercase;letter-spacing:1px;">Interés</p>
                                      <p style="margin:0;font-size:14px;color:#2D3748;line-height:1.6;font-style:italic;">"{{ params.lead_interest }}"</p>
                                    </td>
                                  </tr>
                                  <tr>
                                    <td style="padding:16px 24px;">
                                      <table width="100%" cellpadding="0" cellspacing="0">
                                        <tr>
                                          <td width="48%">
                                            <p style="margin:0 0 3px;font-size:11px;color:#A0AEC0;text-transform:uppercase;letter-spacing:1px;">Origen</p>
                                            <p style="margin:0;font-size:14px;color:#0F1F3D;font-weight:600;">{{ params.lead_source }}</p>
                                          </td>
                                          <td width="4%"></td>
                                          <td width="48%">
                                            <p style="margin:0 0 3px;font-size:11px;color:#A0AEC0;text-transform:uppercase;letter-spacing:1px;">Idioma</p>
                                            <p style="margin:0;font-size:14px;color:#0F1F3D;font-weight:600;">{{ params.lead_language }}</p>
                                          </td>
                                        </tr>
                                      </table>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                            <!-- CAMPAIGN INFO -->
                            <tr>
                              <td style="padding:0 40px 32px;">
                                <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F8F6F1;border-radius:8px;border-left:4px solid #0F1F3D;">
                                  <tr>
                                    <td style="padding:20px 24px;">
                                      <p style="margin:0 0 6px;font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:1px;">Campaña / Contexto</p>
                                      <p style="margin:0;font-size:14px;color:#2D3748;line-height:1.6;">{{ params.campaign_name }}</p>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                            <!-- CTAs -->
                            <tr>
                              <td style="padding:0 40px 40px;text-align:center;">
                                <table width="100%" cellpadding="0" cellspacing="0">
                                  <tr>
                                    <td width="48%" align="center">
                                      <a href="{{ params.notion_url }}" style="display:block;background-color:#0F1F3D;color:#ffffff;font-size:13px;font-weight:600;text-decoration:none;padding:14px 20px;border-radius:6px;letter-spacing:0.5px;">Ver en Notion →</a>
                                    </td>
                                    <td width="4%"></td>
                                    <td width="48%" align="center">
                                      <a href="https://wa.me/{{ params.lead_phone }}" style="display:block;background-color:#25D366;color:#ffffff;font-size:13px;font-weight:600;text-decoration:none;padding:14px 20px;border-radius:6px;letter-spacing:0.5px;">💬 Contactar ahora</a>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                            <!-- FOOTER -->
                            <tr>
                              <td style="background-color:#0F1F3D;padding:24px 40px;text-align:center;">
                                <p style="margin:0 0 4px;font-size:12px;color:#C9A84C;letter-spacing:2px;text-transform:uppercase;">NEXO REAL</p>
                                <p style="margin:0;font-size:11px;color:#4A5568;">© 2026 · info@nexoreal.xyz · Todos los derechos reservados</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
