                                <!-- Property 1 -->
                                <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F8F6F1;border-radius:8px;margin-bottom:12px;">
                                  <tr>
                                    <td style="padding:20px 24px;">
                                      <table width="100%" cellpadding="0" cellspacing="0">
