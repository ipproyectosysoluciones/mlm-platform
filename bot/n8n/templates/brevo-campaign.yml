                                            <p style="margin:0 0 8px;font-size:13px;color:#718096;">📍 {{ params.property_1_location }}</p>
                                            <p style="margin:0;font-size:13px;color:#4A5568;line-height:1.6;">{{ params.property_1_description }}</p>
                                          </td>
