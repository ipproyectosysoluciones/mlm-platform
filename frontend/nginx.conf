server {
    listen 80;
    server_name _;
    
    # PWA MIME types
    types {
        application/manifest+json json;
        application/json json;
        image/svg+xml svg;
        image/png png;
        image/x-icon ico;
    }
    
    # PWA manifest - redirect to webmanifest with proper content-type
    location = /manifest.json {
        root /usr/share/nginx/html;
        # Try webmanifest first, fallback to json
        try_files /manifest.webmanifest /manifest.json =404;
        add_header Content-Type 'application/manifest+json' always;
        add_header Cache-Control 'public, max-age=86400';
    }
    
    # Also handle webmanifest extension
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        add_header Content-Type 'application/manifest+json' always;
        add_header Cache-Control 'public, max-age=86400';
    }
    
    # Service Worker - must not be cached
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Content-Type 'application/javascript' always;
        add_header Service-Worker-Allowed '/';
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
    }
    
    # Workbox - cacheable
    location /workbox- {
        root /usr/share/nginx/html;
        add_header Cache-Control 'public, max-age=31536000, immutable';
    }
    
    # PWA icons - long cache
    location /icons/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control 'public, immutable';
    }
    
    # PWA screenshots - long cache
    location /screenshots/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control 'public, immutable';
    }
    
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
    
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
